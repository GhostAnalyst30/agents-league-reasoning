kind: hosted
name: certpilot-sample-agent
protocols:
  - protocol: responses
    version: 1.0.0
resources:
  cpu: "0.25"
  memory: 0.5Gi
environment_variables:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
  - name: AZURE_OPENAI_BASE_URL
    value: ${AZURE_OPENAI_BASE_URL}
  - name: AZURE_AI_API_KEY
    value: ${AZURE_AI_API_KEY}
  - name: AZURE_SEARCH_ENDPOINT
    value: ${AZURE_SEARCH_ENDPOINT}
  - name: AZURE_SEARCH_API_KEY
    value: ${AZURE_SEARCH_API_KEY}
  - name: CERTPILOT_KB_NAME
    value: certpilot-kb
